version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cfo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cfo_db
      POSTGRES_USER: cfo
      POSTGRES_PASSWORD: cfo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfo -d cfo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cfo_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cfo:cfo_password@postgres:5432/cfo_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-super-secret-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cfo_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
