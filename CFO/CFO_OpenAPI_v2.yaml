# ──────────────────────────────────────────────────────────────
#  TABELA DE TRANSIÇÕES VÁLIDAS (referência)
# ──────────────────────────────────────────────────────────────
# Estado atual      → Estado seguinte     Endpoint
# ─────────────────────────────────────────────────────────────
# DRAFT             → CLASSIFIED          PUT /classify
# CLASSIFIED        → STRUCTURED          PUT /structure
# STRUCTURED        → ANALYZED            PUT /analyze
# ANALYZED          → RECOMMENDED         PUT /analyze (automático)
# RECOMMENDED       → DECIDED             PUT /decide
# DECIDED           → UNDER_REVIEW        (automático após 90 dias)
# UNDER_REVIEW      → CLOSED              PUT /review
# ─────────────────────────────────────────────────────────────
# Qualquer outra transição retorna HTTP 409 INVALID_STATE_TRANSITION
