services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mentor:mentor123@postgres:5432/mentor_cfo
      DATABASE_URL_SYNC: postgresql://mentor:mentor123@postgres:5432/mentor_cfo
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor123
      POSTGRES_DB: mentor_cfo
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor -d mentor_cfo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: mentor123
      POSTGRES_DB: mentor_cfo_test
    ports:
      - "5433:5432"

  frontend:
    build: ../frontend
    ports:
      - "3002:3000"
    environment:
      VITE_API_URL: http://app:8000
    depends_on:
      - app
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/index.html:/app/index.html
      - ../frontend/vite.config.js:/app/vite.config.js

volumes:
  postgres_data:
